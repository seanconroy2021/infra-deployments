apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - ../base/monitor/development
  - https://github.com/seanconroy2021/release-service/config/default?ref=4f31a2837babe901f5ad15b9ec05d0ddb1199799
  - release_service_config.yaml
images:
  - name: quay.io/konflux-ci/release-service
    newName: quay.io/sconroykonflux/release-service
    newTag: 1.0.37
namespace: release-service
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: controller-manager
    path: sealights-token-patch.yaml
